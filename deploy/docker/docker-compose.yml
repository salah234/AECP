version: "3.9"

# Local development topology only. Production runs on Kubernetes
# (see deploy/k8s) with mTLS between services and no plaintext internal
# traffic; this compose file uses a shared bridge network for simplicity
# and is not a security reference.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aecp
      POSTGRES_PASSWORD: aecp_dev_only
      POSTGRES_DB: aecp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [aecp]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
    networks: [aecp]

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
    networks: [aecp]

  taskgraph:
    build:
      context: ../..
      dockerfile: taskgraph/Dockerfile
    depends_on: [postgres, otel-collector]
    env_file: ../../.env
    # ALLOWED_CALLERS differs per service (see networkpolicy/data-plane-edges.yaml)
    # and a single shared .env key can't express that — overridden per service here.
    # POSTGRES_DSN is also overridden: the shared .env's value points at
    # `localhost`, correct for running a service directly on the host but
    # wrong once it's a container in this network — `localhost` there means
    # the container itself, not the postgres container (reachable by its
    # compose service name instead).
    environment:
      ALLOWED_CALLERS: "coordinator,gateway,integration"
      POSTGRES_DSN: "postgresql://aecp:aecp_dev_only@postgres:5432/aecp"
    networks: [aecp]

  state:
    build:
      context: ../..
      dockerfile: state/Dockerfile
    depends_on: [postgres, otel-collector]
    env_file: ../../.env
    environment:
      ALLOWED_CALLERS: "coordinator,agents,gateway,integration"
      POSTGRES_DSN: "postgresql://aecp:aecp_dev_only@postgres:5432/aecp"
    networks: [aecp]

  coordinator:
    build:
      context: ../..
      dockerfile: coordinator/Dockerfile
    depends_on: [taskgraph, state, otel-collector]
    env_file: ../../.env
    environment:
      ALLOWED_CALLERS: "agents,gateway"
    networks: [aecp]

  agents:
    build:
      context: ../..
      dockerfile: agents/Dockerfile
    depends_on: [coordinator, state, otel-collector]
    env_file: ../../.env
    # ALLOWED_CALLERS="coordinator" from the shared .env is already correct
    # here (see deploy/k8s/networkpolicy/agents-edges.yaml) — no override.
    networks: [aecp]

  integration:
    build:
      context: ../..
      dockerfile: integration/Dockerfile
    depends_on: [taskgraph, state, otel-collector]
    env_file: ../../.env
    environment:
      ALLOWED_CALLERS: "coordinator,gateway"
    networks: [aecp]

  observability:
    build:
      context: ../..
      dockerfile: observability/Dockerfile
    depends_on: [postgres, otel-collector]
    env_file: ../../.env
    # Any service may write audit events (networkpolicy/data-plane-edges.yaml
    # allows ingress from every namespace on this port) — enumerate every
    # real caller since AllowList has no wildcard. POSTGRES_DSN override:
    # see taskgraph's comment above — same localhost-vs-container-network fix.
    environment:
      ALLOWED_CALLERS: "coordinator,taskgraph,state,agents,integration,gateway"
      POSTGRES_DSN: "postgresql://aecp:aecp_dev_only@postgres:5432/aecp"
    networks: [aecp]

  gateway:
    build:
      context: ../..
      dockerfile: gateway/Dockerfile
    depends_on: [coordinator, taskgraph, state, integration, observability]
    ports:
      - "8080:8080"
    env_file: ../../.env
    networks: [aecp]

  dashboard:
    build:
      context: ../..
      dockerfile: dashboard/Dockerfile
      # Must be a build arg, not just a runtime `environment:` entry —
      # Next.js bakes NEXT_PUBLIC_* into the client bundle when `npm run
      # build` runs, which happens during `docker compose build`, before
      # any runtime environment exists. See dashboard/Dockerfile's comment.
      args:
        NEXT_PUBLIC_GATEWAY_URL: "http://localhost:8080"
    depends_on: [gateway]
    ports:
      - "3000:3000"
    networks: [aecp]

networks:
  aecp:
    driver: bridge

volumes:
  pgdata:
