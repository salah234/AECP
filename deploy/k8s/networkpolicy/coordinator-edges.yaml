apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: coordinator-ingress
  namespace: aecp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: coordinator
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/component: gateway } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: agents } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: coordinator-egress
  namespace: aecp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: coordinator
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: taskgraph } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: state } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: agents } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: observability } }
    - ports:
        - port: 53
          protocol: UDP
