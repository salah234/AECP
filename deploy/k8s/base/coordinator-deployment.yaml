# Same template as gateway-deployment.yaml. Coordinator binds gRPC only
# (no LoadBalancer/Ingress — see deploy/k8s/networkpolicy/coordinator-edges.yaml,
# ingress is restricted to gateway and agents pods).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinator
  namespace: aecp
  labels:
    app.kubernetes.io/name: aecp
    app.kubernetes.io/component: coordinator
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/component: coordinator
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: coordinator
          image: aecp/coordinator:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8082
              name: http
          envFrom:
            - secretRef:
                name: coordinator-env
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: coordinator
  namespace: aecp
spec:
  selector:
    app.kubernetes.io/component: coordinator
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
    - port: 8082
      targetPort: 8082
      name: http
  type: ClusterIP
