# Same template as gateway-deployment.yaml, adapted for a stateless
# Next.js frontend: no gRPC port, and its only configuration
# (NEXT_PUBLIC_GATEWAY_URL) is public by definition — Next.js inlines
# NEXT_PUBLIC_* vars into the client-side bundle at build time, so
# treating it as a Secret would be misleading. A ConfigMap, not a Secret,
# is the correct primitive here.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: aecp
  labels:
    app.kubernetes.io/name: aecp
    app.kubernetes.io/component: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/component: dashboard
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard
          image: aecp/dashboard:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: dashboard-env
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-env
  namespace: aecp
data:
  NEXT_PUBLIC_GATEWAY_URL: "https://gateway.aecp.internal"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: aecp
spec:
  selector:
    app.kubernetes.io/component: dashboard
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
