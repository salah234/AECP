[project]
name = "aecp-platform"
version = "0.1.0"
description = "Shared library: config, secrets, service identity, tenant isolation, telemetry, error taxonomy. Every AECP service depends on this package instead of reimplementing cross-cutting concerns."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "grpcio>=1.68",
    "asyncpg>=0.30",
    "opentelemetry-sdk>=1.28",
    "opentelemetry-exporter-otlp-proto-grpc>=1.28",
    "cryptography>=43.0",
]

[dependency-groups]
dev = ["ruff>=0.7", "mypy>=1.13", "pytest>=8.3", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aecp_platform"]
