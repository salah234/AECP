name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTHON_VERSION: "3.12"

jobs:
  python-lint-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [platform, coordinator, taskgraph, agents, state, integration, observability, gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv
      - name: install
        working-directory: ${{ matrix.service }}
        run: uv pip install --system -e . --group dev
      - name: ruff
        working-directory: ${{ matrix.service }}
        run: ruff check .
      - name: mypy
        working-directory: ${{ matrix.service }}
        run: mypy .

  python-test:
    runs-on: ubuntu-latest
    needs: python-lint-typecheck
    strategy:
      matrix:
        service: [coordinator, taskgraph, agents, state, integration, observability, gateway]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aecp
          POSTGRES_PASSWORD: aecp_test
          POSTGRES_DB: aecp_test
        ports: ["5432:5432"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv
      - working-directory: ${{ matrix.service }}
        run: uv pip install --system -e . --group dev
      - working-directory: ${{ matrix.service }}
        run: pytest -v

  # CLAUDE.md Development Workflow #2: any PR touching scheduling or
  # conflict logic needs a concurrent-agent simulation test. This job
  # only checks the required test files still exist and are not skipped
  # — it does not replace human review of what they actually assert.
  concurrency-test-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify concurrent-agent tests present
        run: |
          test -f coordinator/tests/test_concurrent_agents.py
          test -f integration/tests/test_concurrent_agents.py

  dependency-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [platform, coordinator, taskgraph, agents, state, integration, observability, gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pip-audit
      - working-directory: ${{ matrix.service }}
        run: pip-audit -r <(pip freeze)

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  proto-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - working-directory: proto
        run: buf lint

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  container-scan:
    runs-on: ubuntu-latest
    needs: [python-test, dashboard]
    strategy:
      matrix:
        service: [coordinator, taskgraph, agents, state, integration, observability, gateway, dashboard]
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker build -f ${{ matrix.service }}/Dockerfile -t aecp/${{ matrix.service }}:ci .
      - name: trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aecp/${{ matrix.service }}:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
