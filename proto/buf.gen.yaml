
# Generates Python (grpcio) stubs consumed by every backend service, and
# TypeScript stubs consumed by the dashboard via gRPC-web through the
# gateway. Run `make proto-gen` (see root Makefile) rather than invoking
# buf directly, so generated output always lands in the right per-language
# directories.
version: v2

plugins:
  - remote: buf.build/protocolbuffers/python
    out: ../state/app

  - remote: buf.build/grpc/python
    out: ../state/app

  - remote: buf.build/protocolbuffers/python
    out: ../taskgraph/app

  - remote: buf.build/grpc/python
    out: ../taskgraph/app

  - remote: buf.build/protocolbuffers/python
    out: ../agents/app

  - remote: buf.build/grpc/python
    out: ../agents/app

  - remote: buf.build/protocolbuffers/pyi
    out: ../agents/app

  - remote: buf.build/protocolbuffers/python
    out: ../coordinator/app

  - remote: buf.build/grpc/python
    out: ../coordinator/app

  - remote: buf.build/protocolbuffers/python
    out: ../gateway/app

  - remote: buf.build/grpc/python
    out: ../gateway/app
