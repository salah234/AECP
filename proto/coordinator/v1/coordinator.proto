syntax = "proto3";

package aecp.coordinator.v1;

option go_package = "aecp/proto/coordinator/v1;coordinatorv1";

import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";
import "agents/v1/agents.proto";

// AssignmentRequest is raised by the scheduler when a task node becomes
// ready (all dependencies satisfied) and needs an agent.
message AssignmentRequest {
  string task_id = 1;
  string tenant_id = 2;
}

message AssignmentDecision {
  string task_id = 1;
  string agent_id = 2;
  aecp.common.v1.RiskTier granted_risk_tier = 3;
  string rationale = 4;
}

message ScheduleRequest {
  string tenant_id = 1;
}

message ScheduleResponse {
  repeated AssignmentDecision decisions = 1;
}

message EscalateRequest {
  string task_id = 1;
  string agent_id = 2;
  string reason = 3;
  aecp.common.v1.RiskTier requested_risk_tier = 4;
  // The calling agent session already knows its own tenant_id (from the
  // AgentSession it was spawned with); carrying it here lets Coordinator
  // bind_tenant() before it looks up the task node, rather than needing
  // an unscoped lookup just to discover which tenant a task belongs to.
  string tenant_id = 5;
}

message EscalateResponse {
  bool approved = 1;
  string decided_by = 2;
}

message ReportBlockerRequest {
  string task_id = 1;
  string agent_id = 2;
  string description = 3;
  string tenant_id = 4; // see EscalateRequest.tenant_id
}

message ReportBlockerResponse {
  bool acknowledged = 1;
}

message ReportCompletionRequest {
  string task_id = 1;
  string agent_id = 2;
  string tenant_id = 3; // see EscalateRequest.tenant_id
  string summary = 4;   // short "what was done"
  string rationale = 5; // fuller explanation, becomes the decision log rationale
}

message ReportCompletionResponse {
  bool acknowledged = 1;
}

message ListAgentSessionsRequest {
  string tenant_id = 1;
}

message ListAgentSessionsResponse {
  repeated aecp.agents.v1.AgentSession sessions = 1;
}

// CoordinatorService is the only component allowed to make cross-agent
// tradeoffs: scheduling, assignment, and escalation decisions. Agent
// workers never talk to each other directly; everything routes here.
service CoordinatorService {
  // Schedule evaluates ready task nodes and produces assignment decisions
  // for the current tick. Sequencing (what runs in parallel vs. serial)
  // is decided here, not by individual agents.
  rpc Schedule(ScheduleRequest) returns (ScheduleResponse);

  // Escalate is called by an agent that discovers a task is bigger than
  // its granted risk tier. The agent must halt and wait for a decision
  // rather than proceeding at its own judgment.
  rpc Escalate(EscalateRequest) returns (EscalateResponse);

  rpc ReportBlocker(ReportBlockerRequest) returns (ReportBlockerResponse);

  // ReportCompletion is called by an agent session that finished its task.
  // Transitions the task to IN_REVIEW, not DONE — see
  // coordinator/app/tradeoff.py's report_completion for why.
  rpc ReportCompletion(ReportCompletionRequest) returns (ReportCompletionResponse);

  // ListAgentSessions is a read-only proxy over AgentPoolService.ListSessions:
  // Gateway has no network edge to Agent Pool (and never should, per
  // CLAUDE.md's "everything routes through the Coordinator"), so this is
  // how the dashboard's Agents page sees live session data.
  rpc ListAgentSessions(ListAgentSessionsRequest) returns (ListAgentSessionsResponse);
}
